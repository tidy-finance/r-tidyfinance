on:
  schedule:
    - cron: "0 0 1 * *" # Monthly, on the 1st of each month
  workflow_dispatch: # Allow manual triggering

name: Update Risk-Free Rate on HuggingFace

permissions:
  contents: read

jobs:
  update-risk-free:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::arrow
            any::dplyr
            any::tibble
            any::tidyr
            any::lubridate

      - name: Download and process risk-free rate data from FRED
        run: Rscript data-raw/update_risk_free_rate.R

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Upload parquet files to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "tidy-finance/risk-free"

          for freq in ("monthly", "daily"):
              local_path = f"/tmp/tidyfinance-risk-free-{freq}.parquet"
              api.upload_file(
                  path_or_fileobj=local_path,
                  path_in_repo=f"{freq}.parquet",
                  repo_id=repo_id,
                  repo_type="dataset",
                  commit_message=f"Update {freq} risk-free rate data",
              )
              print(f"Uploaded {freq}.parquet")

          print("All uploads complete.")
          EOF
